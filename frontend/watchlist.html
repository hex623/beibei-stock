<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自选股 - A股智能分析</title>
  <link rel="stylesheet" href="style.css">
  <script src="app.js"></script>
</head>
<body>
  <nav class="sidebar">
    <div class="sidebar-brand">
      <h1>📈 智股</h1>
      <div class="subtitle">A股智能分析工具</div>
    </div>
    <a href="/" class="nav-item" data-page="sentiment">
      <span class="nav-icon">📊</span> 大盘情绪
    </a>
    <a href="/sectors" class="nav-item" data-page="sectors">
      <span class="nav-icon">🏭</span> 行业板块
    </a>
    <a href="/quotes" class="nav-item" data-page="quotes">
      <span class="nav-icon">📈</span> 行情热股
    </a>
    <a href="/watchlist" class="nav-item active" data-page="watchlist">
      <span class="nav-icon">⭐</span> 自选股
    </a>
    <a href="/ai" class="nav-item" data-page="ai">
      <span class="nav-icon">🤖</span> AI分析
    </a>
  </nav>

  <main class="main-content">
    <div class="page-header">
      <h2>⭐ 自选股</h2>
      <p>快速查看关注个股的实时行情 · 数据保存在浏览器本地</p>
    </div>

    <div class="watchlist-actions">
      <button class="btn btn-primary" onclick="refreshAll()">🔄 刷新行情</button>
      <button class="btn btn-outline" onclick="clearAll()">🗑️ 清空自选</button>
    </div>

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <span class="card-title" style="margin-bottom:0">📋 自选股列表</span>
        <span id="wlCount" style="font-size:12px;color:var(--text-muted)"></span>
      </div>

      <div id="watchlistContainer">
        <div class="watchlist-empty" id="emptyState">
          <div class="icon">⭐</div>
          <p>自选股列表为空</p>
          <p style="font-size:13px;margin-top:8px">在「行情热股」页面点击「+ 自选」按钮添加关注的股票</p>
          <a href="/quotes" class="btn btn-primary" style="display:inline-block;margin-top:16px;text-decoration:none">去添加股票</a>
        </div>
        <div style="overflow-x:auto">
          <table class="data-table" id="wlTable" style="display:none">
            <thead>
              <tr>
                <th>代码</th>
                <th>名称</th>
                <th>最新价</th>
                <th>涨跌幅</th>
                <th>涨跌额</th>
                <th>成交额</th>
                <th>换手率</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="wlTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="update-time" id="lastUpdate"></div>
  </main>

  <script>
    async function loadWatchlist() {
      const list = getWatchlist();
      const container = document.getElementById('watchlistContainer');
      const emptyState = document.getElementById('emptyState');
      const table = document.getElementById('wlTable');
      const tbody = document.getElementById('wlTableBody');

      document.getElementById('wlCount').textContent = `共 ${list.length} 只股票`;

      if (list.length === 0) {
        emptyState.style.display = 'block';
        table.style.display = 'none';
        document.getElementById('lastUpdate').textContent = '';
        return;
      }

      emptyState.style.display = 'none';
      table.style.display = '';

      // 分批次获取行情（最多10只并发请求）
      const BATCH_SIZE = 5;
      let allQuotes = [];

      for (let i = 0; i < list.length; i += BATCH_SIZE) {
        const batch = list.slice(i, i + BATCH_SIZE);
        const promises = batch.map(s =>
          apiGet(`/stocks/search?keyword=${encodeURIComponent(s.code)}`)
        );
        const results = await Promise.all(promises);
        results.forEach(r => {
          if (Array.isArray(r) && r.length > 0) {
            allQuotes.push(r[0]);
          }
        });
      }

      // 去重（保留最新数据）
      const seen = new Set();
      allQuotes = allQuotes.filter(s => {
        if (seen.has(s.code)) return false;
        seen.add(s.code);
        return true;
      });

      // 如果有没在quotes里匹配到的，补一个基本信息
      list.forEach(s => {
        if (!allQuotes.some(q => q.code === s.code)) {
          allQuotes.push({ code: s.code, name: s.name, price: 0, change_pct: 0, change_amount: 0, amount: '—', turnover: 0 });
        }
      });

      tbody.innerHTML = allQuotes.map(s => `
        <tr>
          <td class="code-cell">${s.code}</td>
          <td><span class="stock-name">${s.name}</span></td>
          <td style="font-weight:600">${s.price ? fmtPrice(s.price) : '—'}</td>
          <td class="${pctClass(s.change_pct)}" style="font-weight:600">${s.change_pct !== undefined ? fmtPct(s.change_pct) : '—'}</td>
          <td class="${pctClass(s.change_amount)}">${s.change_amount !== undefined ? fmtPrice(s.change_amount) : '—'}</td>
          <td>${s.amount || '—'}</td>
          <td>${s.turnover ? s.turnover.toFixed(2) + '%' : '—'}</td>
          <td>
            <button class="btn btn-sm btn-outline"
                    onclick="removeStock('${s.code}')"
                    style="padding:2px 10px;font-size:11px;color:var(--accent-red);border-color:rgba(255,71,87,0.3)">
              ✕ 删除
            </button>
          </td>
        </tr>
      `).join('');

      document.getElementById('lastUpdate').textContent =
        `数据更新于 ${new Date().toLocaleTimeString('zh-CN')} · 盘中可手动刷新`;
    }

    function removeStock(code) {
      removeFromWatchlist(code);
      loadWatchlist();
    }

    function refreshAll() {
      document.getElementById('lastUpdate').textContent = '刷新中...';
      loadWatchlist();
    }

    function clearAll() {
      if (getWatchlist().length === 0) return;
      if (confirm('确定清空所有自选股吗？')) {
        saveWatchlist([]);
        loadWatchlist();
      }
    }

    loadWatchlist();
  </script>
</body>
</html>
