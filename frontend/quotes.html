<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>行情热股 - A股智能分析</title>
  <link rel="stylesheet" href="style.css">
  <script src="app.js"></script>
</head>
<body>
  <nav class="sidebar">
    <div class="sidebar-brand">
      <h1>📈 智股</h1>
      <div class="subtitle">A股智能分析工具</div>
    </div>
    <a href="/" class="nav-item" data-page="sentiment">
      <span class="nav-icon">📊</span> 大盘情绪
    </a>
    <a href="/sectors" class="nav-item" data-page="sectors">
      <span class="nav-icon">🏭</span> 行业板块
    </a>
    <a href="/quotes" class="nav-item active" data-page="quotes">
      <span class="nav-icon">📈</span> 行情热股
    </a>
    <a href="/watchlist" class="nav-item" data-page="watchlist">
      <span class="nav-icon">⭐</span> 自选股
    </a>
    <a href="/ai" class="nav-item" data-page="ai">
      <span class="nav-icon">🤖</span> AI分析
    </a>
  </nav>

  <main class="main-content">
    <div class="page-header">
      <h2>📈 行情热股</h2>
      <p>A股热门个股排行 · 个股搜索与快速查看</p>
    </div>

    <!-- 搜索框 -->
    <div class="card" style="margin-bottom:16px">
      <div class="card-title" style="margin-bottom:12px">🔍 个股查询</div>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="输入股票名称或代码，如：贵州茅台、600519..." onkeydown="if(event.key==='Enter') searchStock()">
        <button class="btn btn-primary" onclick="searchStock()">搜索</button>
      </div>
      <div id="searchResults"></div>
    </div>

    <!-- 热门股 -->
    <div class="card">
      <div class="card-title" style="display:flex;justify-content:space-between;margin-bottom:0">
        <span>🔥 热门个股（按成交额排序）</span>
        <span style="font-size:12px;color:var(--text-muted)" id="hotCount"></span>
      </div>
      <div style="overflow-x:auto;margin-top:12px">
        <table class="data-table" id="hotTable">
          <thead>
            <tr>
              <th>排名</th>
              <th>代码</th>
              <th>名称</th>
              <th>最新价</th>
              <th>涨跌幅</th>
              <th>涨跌额</th>
              <th>成交额</th>
              <th>换手率</th>
              <th>市盈率</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="hotTableBody"></tbody>
        </table>
      </div>
    </div>

    <div class="update-time" id="lastUpdate">加载中...</div>
  </main>

  <script>
    async function loadHotStocks() {
      const data = await apiGet('/stocks/hot?top_n=50');
      if (data.error) {
        document.getElementById('lastUpdate').textContent = '⚠️ ' + data.error;
        return;
      }
      if (!Array.isArray(data)) return;

      document.getElementById('hotCount').textContent = `TOP ${data.length}`;
      const tbody = document.getElementById('hotTableBody');

      tbody.innerHTML = data.map((s, i) => {
        const inWatch = isInWatchlist(s.code);
        return `
        <tr>
          <td style="color:var(--text-muted)">${i + 1}</td>
          <td class="code-cell">${s.code}</td>
          <td><span class="stock-name" onclick="quickSearch('${s.name}')">${s.name}</span></td>
          <td style="font-weight:600">${fmtPrice(s.price)}</td>
          <td class="${pctClass(s.change_pct)}" style="font-weight:600">${fmtPct(s.change_pct)}</td>
          <td class="${pctClass(s.change_amount)}">${fmtPrice(s.change_amount)}</td>
          <td>${s.amount || '—'}</td>
          <td>${s.turnover ? s.turnover.toFixed(2) + '%' : '—'}</td>
          <td>${s.pe ? s.pe.toFixed(2) : '—'}</td>
          <td>
            <button class="btn btn-sm ${inWatch ? 'btn-outline' : 'btn-primary'}"
                    onclick="toggleWatchlist('${s.code}','${s.name}',this)"
                    style="padding:2px 10px;font-size:11px">
              ${inWatch ? '✓ 已加' : '+ 自选'}
            </button>
          </td>
        </tr>`;
      }).join('');

      document.getElementById('lastUpdate').textContent =
        `数据更新于 ${new Date().toLocaleTimeString('zh-CN')}`;
    }

    async function searchStock() {
      const keyword = document.getElementById('searchInput').value.trim();
      if (!keyword) return;

      const resultsDiv = document.getElementById('searchResults');
      resultsDiv.innerHTML = '<div class="ai-loading">搜索中...</div>';

      const data = await apiGet(`/stocks/search?keyword=${encodeURIComponent(keyword)}`);
      if (data.error) {
        resultsDiv.innerHTML = `<div style="color:var(--accent-red);padding:12px">⚠️ ${data.error}</div>`;
        return;
      }

      if (!Array.isArray(data) || data.length === 0) {
        resultsDiv.innerHTML = '<div style="color:var(--text-muted);padding:12px">未找到匹配的股票</div>';
        return;
      }

      resultsDiv.innerHTML = `
        <table class="data-table">
          <thead>
            <tr>
              <th>代码</th>
              <th>名称</th>
              <th>最新价</th>
              <th>涨跌幅</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody>
            ${data.map(s => {
              const inWatch = isInWatchlist(s.code);
              return `<tr>
                <td class="code-cell">${s.code}</td>
                <td><b>${s.name}</b></td>
                <td>${fmtPrice(s.price)}</td>
                <td class="${pctClass(s.change_pct)}">${fmtPct(s.change_pct)}</td>
                <td>
                  <button class="btn btn-sm ${inWatch ? 'btn-outline' : 'btn-primary'}"
                          onclick="toggleWatchlist('${s.code}','${s.name}',this)"
                          style="padding:2px 10px;font-size:11px">
                    ${inWatch ? '✓ 已加' : '+ 自选'}
                  </button>
                </td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      `;
    }

    function quickSearch(name) {
      document.getElementById('searchInput').value = name;
      searchStock();
    }

    function toggleWatchlist(code, name, btn) {
      if (isInWatchlist(code)) {
        removeFromWatchlist(code);
        btn.className = 'btn btn-sm btn-primary';
        btn.textContent = '+ 自选';
      } else {
        addToWatchlist({ code, name });
        btn.className = 'btn btn-sm btn-outline';
        btn.textContent = '✓ 已加';
      }
    }

    async function init() {
      await loadHotStocks();
      setInterval(loadHotStocks, 60000);
    }

    init();
  </script>
</body>
</html>
