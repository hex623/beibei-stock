<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI分析 - A股智能分析</title>
  <link rel="stylesheet" href="style.css">
  <script src="app.js"></script>
</head>
<body>
  <nav class="sidebar">
    <div class="sidebar-brand">
      <h1>📈 智股</h1>
      <div class="subtitle">A股智能分析工具</div>
    </div>
    <a href="/" class="nav-item" data-page="sentiment">
      <span class="nav-icon">📊</span> 大盘情绪
    </a>
    <a href="/sectors" class="nav-item" data-page="sectors">
      <span class="nav-icon">🏭</span> 行业板块
    </a>
    <a href="/quotes" class="nav-item" data-page="quotes">
      <span class="nav-icon">📈</span> 行情热股
    </a>
    <a href="/watchlist" class="nav-item" data-page="watchlist">
      <span class="nav-icon">⭐</span> 自选股
    </a>
    <a href="/ai" class="nav-item active" data-page="ai">
      <span class="nav-icon">🤖</span> AI分析
    </a>
  </nav>

  <main class="main-content">
    <div class="page-header">
      <h2>🤖 AI 市场分析</h2>
      <p>基于实时数据的智能化市场解读 · 自动生成大盘研判</p>
    </div>

    <!-- 一分钟看盘 -->
    <div class="card" style="margin-bottom:16px">
      <div class="card-title" style="margin-bottom:12px">⚡ 一分钟看盘 — 基于实时数据的自动解读</div>
      <div id="autoAnalysis" class="ai-result">
        <div class="ai-loading">⏳ 正在生成分析报告...</div>
      </div>
      <div class="update-time" id="autoUpdateTime"></div>
    </div>

    <!-- 自定义分析 -->
    <div class="card">
      <div class="card-title" style="margin-bottom:12px">💬 自定义分析</div>
      <div class="ai-input-area">
        <textarea id="userPrompt" placeholder="输入你想分析的股票、板块或市场现象，例如：&#10;• 分析今天白酒板块的走势&#10;• 贵州茅台近期表现如何&#10;• 今天市场情绪怎么样&#10;• 帮我看看当前最强的板块"></textarea>
        <button class="btn btn-primary" onclick="customAnalysis()">🤖 开始分析</button>
      </div>
      <div id="customResult" class="ai-result" style="display:none"></div>
    </div>

    <!-- 快捷指令 -->
    <div style="margin-top:16px">
      <div class="card-title" style="margin-bottom:8px">⚡ 快捷分析</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-outline" onclick="quickAnalysis('今天市场整体情绪怎么样？')">📊 市场情绪</button>
        <button class="btn btn-outline" onclick="quickAnalysis('今天最强的板块是哪些？')">🏭 强势板块</button>
        <button class="btn btn-outline" onclick="quickAnalysis('资金流向哪些行业？')">💰 资金流向</button>
        <button class="btn btn-outline" onclick="quickAnalysis('今天的涨停板情况如何？')">🔴 涨停复盘</button>
      </div>
    </div>
  </main>

  <script>
    // ======== 自动看盘分析 ========
    async function generateAutoAnalysis() {
      const container = document.getElementById('autoAnalysis');

      // 从静态 JSON 加载数据
      const [sentiment, sectors] = await Promise.all([
        loadJSON('sentiment.json'),
        loadJSON('sectors.json'),
      ]);

      if (!sentiment || sentiment.error) {
        container.innerHTML = `<div style="color:var(--accent-red)">⚠️ 数据获取失败: ${sentiment.error}</div>`;
        return;
      }

      // 构建分析报告
      const temp = sentiment.sentiment_temperature || 0;
      const tempLevel = temp < 30 ? '❄️ 市场情绪偏冷' : temp > 70 ? '🔥 市场情绪过热' : '⚖️ 市场情绪中性';
      const tempDesc = temp < 30 ? '赚钱效应较差，市场处于冰点区域' :
                        temp < 45 ? '市场偏弱，资金参与意愿不高' :
                        temp < 55 ? '市场平稳，多空平衡' :
                        temp < 70 ? '市场活跃，赚钱效应较好' :
                        '市场亢奋，注意风险控制';

      const upRatio = sentiment.up_count && sentiment.total_stocks ?
        (sentiment.up_count / sentiment.total_stocks * 100).toFixed(1) : '--';
      const downRatio = sentiment.down_count && sentiment.total_stocks ?
        (sentiment.down_count / sentiment.total_stocks * 100).toFixed(1) : '--';

      // 板块分析
      let strongSectors = '', weakSectors = '';
      if (Array.isArray(sectors) && sectors.length > 0) {
        const top = sectors.slice(0, 5);
        const bottom = sectors.slice(-5).reverse();
        strongSectors = top.map(s => `${s.name}(${fmtPct(s.change_pct)})`).join('、');
        weakSectors = bottom.map(s => `${s.name}(${fmtPct(s.change_pct)})`).join('、');
      }

      const now = new Date();
      const isTradingTime = now.getHours() >= 9 && now.getHours() < 15;

      const report = `
## 📋 市场概览（${new Date().toLocaleDateString('zh-CN')}）

### ${tempLevel}
> ${tempDesc} · 当前情绪温度 ${temp}°

### 📊 关键指标
| 指标 | 数值 |
|:---|---:|
| 上涨家数 | ${sentiment.up_count}（占比 ${upRatio}%） |
| 下跌家数 | ${sentiment.down_count}（占比 ${downRatio}%） |
| 涨停/跌停 | ${sentiment.limit_up} / ${sentiment.limit_down} |
| 涨跌比 | ${sentiment.advance_decline_ratio} |
| 成交额 | ${sentiment.total_amount} |

### 🏭 板块动态
**强势板块 🔥：** ${strongSectors || '暂无数据'}
**弱势板块 🧊：** ${weakSectors || '暂无数据'}

${isTradingTime ? '> ⏰ 盘中实时分析，数据持续更新中...' : '> 🕐 盘后复盘数据'}

> ⚠️ 以上内容基于公开数据自动生成，仅供参考，不构成投资建议。
      `.trim();

      container.innerHTML = report;
      document.getElementById('autoUpdateTime').textContent =
        `更新于 ${new Date().toLocaleTimeString('zh-CN')}`;
    }

    // ======== 自定义分析 ========
    async function customAnalysis() {
      const prompt = document.getElementById('userPrompt').value.trim();
      if (!prompt) {
        document.getElementById('userPrompt').focus();
        return;
      }
      await doAnalysis(prompt);
    }

    function quickAnalysis(prompt) {
      document.getElementById('userPrompt').value = prompt;
      doAnalysis(prompt);
    }

    async function doAnalysis(prompt) {
      const resultDiv = document.getElementById('customResult');
      resultDiv.style.display = 'block';
      resultDiv.innerHTML = '<div class="ai-loading">🤔 正在分析...</div>';

      // 从静态 JSON 加载数据
      const [sentiment, sectors, hotStocks] = await Promise.all([
        loadJSON('sentiment.json'),
        loadJSON('sectors.json'),
        loadJSON('hot_stocks.json'),
      ]);

      // 构建数据摘要
      let dataSummary = '';
      if (sentiment && !sentiment.error) {
        dataSummary += `大盘: 情绪温度${sentiment.sentiment_temperature}°, ` +
          `上涨${sentiment.up_count}/${sentiment.total_stocks}, ` +
          `涨停${sentiment.limit_up}, 跌停${sentiment.limit_down}, ` +
          `成交额${sentiment.total_amount}。`;
      }
      if (Array.isArray(sectors) && sectors.length > 0) {
        const top3 = sectors.slice(0, 3).map(s => `${s.name}(${fmtPct(s.change_pct)})`).join('、');
        const bot3 = sectors.slice(-3).reverse().map(s => `${s.name}(${fmtPct(s.change_pct)})`).join('、');
        dataSummary += `\n强势板块: ${top3}。弱势板块: ${bot3}。`;
      }
      if (Array.isArray(hotStocks) && hotStocks.length > 0) {
        const top5 = hotStocks.slice(0, 5).map(s => `${s.name}(${fmtPct(s.change_pct)})`).join('、');
        dataSummary += `\n热门个股(成交额TOP5): ${top5}。`;
      }

      // 基于关键词生成针对性分析
      const result = generateAnalysis(prompt, sentiment, sectors, hotStocks, dataSummary);

      resultDiv.innerHTML = result;
    }

    function generateAnalysis(prompt, sentiment, sectors, hotStocks, dataSummary) {
      const lowerPrompt = prompt.toLowerCase();

      // 识别意图
      const isEmotion = /情绪|大盘|市场|整体|温度/.test(lowerPrompt);
      const isSector = /板块|行业|题材|概念/.test(lowerPrompt);
      const isMoney = /资金|流向|流入|流出/.test(lowerPrompt);
      const isLimitUp = /涨停|连板|封板/.test(lowerPrompt);
      const isStock = /股票|个股|股价/.test(lowerPrompt) ||
        !(isEmotion || isSector || isMoney || isLimitUp);

      let analysis = '';

      if (isEmotion) {
        const temp = sentiment.sentiment_temperature || 0;
        const tempLevel = temp < 30 ? '偏冷' : temp > 70 ? '过热' : '中性';
        analysis = `
## 📊 市场情绪分析

### 当前情绪温度: ${temp}°（${tempLevel}）

**涨跌结构：**
- 上涨 ${sentiment.up_count} 家（${sentiment.total_stocks ? (sentiment.up_count/sentiment.total_stocks*100).toFixed(1) : '--'}%）
- 下跌 ${sentiment.down_count} 家（${sentiment.total_stocks ? (sentiment.down_count/sentiment.total_stocks*100).toFixed(1) : '--'}%）
- 涨停 ${sentiment.limit_up} 家 / 跌停 ${sentiment.limit_down} 家

**判断：**
${temp < 30 ? '市场处于冰点区域，短期存在反弹可能，但需确认企稳信号。建议控制仓位，等待右侧机会。' :
  temp < 45 ? '市场偏弱运行，赚钱效应有限。可关注逆势走强的板块和个股。' :
  temp < 55 ? '市场多空平衡，结构分化明显。重点在于选对方向和个股。' :
  temp < 70 ? '市场情绪活跃，做多氛围良好。可积极参与主线板块行情。' :
  '市场情绪亢奋，短期可能面临调整风险。建议适度止盈，控制回撤。'}

> 涨跌比: ${sentiment.advance_decline_ratio} | 成交额: ${sentiment.total_amount}
        `.trim();
      } else if (isSector) {
        const top = Array.isArray(sectors) ? sectors.slice(0, 5) : [];
        const bottom = Array.isArray(sectors) ? sectors.slice(-5).reverse() : [];
        analysis = `
## 🏭 板块轮动分析

### 🔥 涨幅前5板块
${top.map((s, i) => `${i+1}. **${s.name}** ${fmtPct(s.change_pct)} — 成交额 ${s.amount||'—'}`).join('\n') || '暂无数据'}

### 🧊 跌幅前5板块
${bottom.map((s, i) => `${i+1}. **${s.name}** ${fmtPct(s.change_pct)} — 成交额 ${s.amount||'—'}`).join('\n') || '暂无数据'}

**板块轮动特征：**
- 领涨板块集中在 ${top[0]?.name || '—'} 方向
- 市场风格偏 ${top.filter(s => s.change_pct > 3).length > 2 ? '进攻' : '防御'}

> 板块持续性需要观察成交额能否持续放大，一日游行情谨慎追高。
        `.trim();
      } else if (isLimitUp) {
        analysis = `
## 🔴 涨停板分析

今日涨停 ${sentiment.limit_up} 家，跌停 ${sentiment.limit_down} 家。

**涨停家数评估：**
${sentiment.limit_up >= 50 ? '涨停家数较多，市场做多意愿强烈，短线情绪活跃。' :
  sentiment.limit_up >= 30 ? '涨停家数适中，局部热点存在，但整体赚钱效应一般。' :
  sentiment.limit_up >= 10 ? '涨停家数偏少，短线情绪偏弱，建议谨慎参与。' :
  '涨停家数极少，市场极度弱势，不适合短线操作。'}

**热点方向推断：**
${Array.isArray(sectors) && sectors[0]?.change_pct > 2 ?
  `板块方面，${sectors[0].name}表现最强（${fmtPct(sectors[0].change_pct)}），涨停个股可能集中在此方向。` :
  '无明显板块效应，涨停以个股独立行情为主。'}

> 连板高度和封板率是判断持续性更关键的指标，建议关注最高连板标的。
        `.trim();
      } else if (isMoney) {
        analysis = `
## 💰 资金流向分析

基于成交额和涨跌数据的间接分析：

**成交额：** ${sentiment.total_amount || '—'}
**涨跌比：** ${sentiment.advance_decline_ratio}

${(sentiment.total_amount && parseFloat(sentiment.total_amount) > 8000) ?
  '成交额较大，市场交投活跃，资金参与度高。' :
  '成交额一般，市场以存量博弈为主，资金偏谨慎。'}

**板块资金偏好（从涨跌幅推测）：**
${Array.isArray(sectors) && sectors.length > 3 ?
  '资金流入方向: ' + sectors.slice(0, 3).map(s => s.name).join('、') +
  '\n资金流出方向: ' + sectors.slice(-3).reverse().map(s => s.name).join('、') :
  '暂无足够数据分析'}

> 注意：实际资金流向需要Level-2数据或沪深港通数据，以上为基于涨跌幅的间接推断。
        `.trim();
      } else {
        // 通用分析
        const top = Array.isArray(sectors) ? sectors.slice(0, 3).map(s => s.name).join('、') : '—';
        const hot = Array.isArray(hotStocks) ? hotStocks.slice(0, 5).map(s => s.name).join('、') : '—';
        analysis = `
## 🤖 综合分析

### 您关注的问题：**${prompt}**

### 📊 当前市场背景
- 情绪温度: ${sentiment.sentiment_temperature || '--'}°
- 上涨/下跌: ${sentiment.up_count || 0}/${sentiment.down_count || 0}
- 涨停/跌停: ${sentiment.limit_up || 0}/${sentiment.limit_down || 0}
- 成交额: ${sentiment.total_amount || '—'}

### 🏭 领涨板块
${top || '暂无数据'}

### 🔥 热门个股
${hot || '暂无数据'}

### 💡 要点提示
${sentiment.sentiment_temperature < 30 ?
  '市场情绪偏冷，观望为主，等待企稳信号' :
  sentiment.sentiment_temperature > 70 ?
  '市场过热，注意风险控制，不宜追高' :
  '市场运行平稳，结构性行情为主，精选个股'}

> ⚠️ 以上分析基于公开市场数据自动生成，不构成投资建议。
        `.trim();
      }

      return analysis;
    }

    // 初始化
    generateAutoAnalysis();
    setInterval(generateAutoAnalysis, 120000);
  </script>
</body>
</html>
