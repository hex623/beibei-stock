<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>行业板块 - A股智能分析</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  <script src="app.js"></script>
</head>
<body>
  <nav class="sidebar">
    <div class="sidebar-brand">
      <h1>📈 智股</h1>
      <div class="subtitle">A股智能分析工具</div>
    </div>
    <a href="/" class="nav-item" data-page="sentiment">
      <span class="nav-icon">📊</span> 大盘情绪
    </a>
    <a href="/sectors" class="nav-item active" data-page="sectors">
      <span class="nav-icon">🏭</span> 行业板块
    </a>
    <a href="/quotes" class="nav-item" data-page="quotes">
      <span class="nav-icon">📈</span> 行情热股
    </a>
    <a href="/watchlist" class="nav-item" data-page="watchlist">
      <span class="nav-icon">⭐</span> 自选股
    </a>
    <a href="/ai" class="nav-item" data-page="ai">
      <span class="nav-icon">🤖</span> AI分析
    </a>
  </nav>

  <main class="main-content">
    <div class="page-header">
      <h2>🏭 行业板块轮动</h2>
      <p>行业板块实时行情 · 概念板块热度追踪</p>
    </div>

    <!-- 板块切换 -->
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('industry')">行业板块</button>
      <button class="tab-btn" onclick="switchTab('concept')">概念板块</button>
    </div>

    <!-- 涨跌分布图 -->
    <div class="grid-2" style="margin-bottom:16px">
      <div class="card">
        <div class="card-title">📊 行业板块涨跌幅分布</div>
        <div id="sectorBarChart" class="chart-container" style="height:500px"></div>
      </div>
      <div class="card">
        <div class="card-title">🔝 涨幅TOP10</div>
        <div id="sectorTopChart" class="chart-container" style="height:500px"></div>
      </div>
    </div>

    <!-- 板块列表 -->
    <div class="card">
      <div class="card-title" style="display:flex;justify-content:space-between;margin-bottom:0">
        <span>📋 全部板块列表</span>
        <span id="sectorCount" style="font-size:12px;color:var(--text-muted)"></span>
      </div>
      <div style="overflow-x:auto;margin-top:12px">
        <table class="data-table" id="sectorTable">
          <thead>
            <tr>
              <th>排名</th>
              <th>板块名称</th>
              <th>最新价</th>
              <th>涨跌幅</th>
              <th>成交额</th>
              <th>上涨/下跌</th>
              <th>领涨股</th>
            </tr>
          </thead>
          <tbody id="sectorTableBody"></tbody>
        </table>
      </div>
    </div>

    <div class="update-time" id="lastUpdate">加载中...</div>
  </main>

  <script>
    let sectorBarChart, sectorTopChart;
    let currentTab = 'industry';

    async function loadSectors() {
      const data = await loadJSON('sectors.json');
      if (!data || data.error || !Array.isArray(data)) {
        document.getElementById('lastUpdate').textContent = '⚠️ 数据加载失败';
        return;
      }

      if (!Array.isArray(data) || data.length === 0) {
        document.getElementById('lastUpdate').textContent = '暂无数据（非交易日可能无数据）';
        return;
      }

      // 按涨跌幅排序
      data.sort((a, b) => b.change_pct - a.change_pct);

      document.getElementById('sectorCount').textContent = `共 ${data.length} 个板块`;

      // 绘制柱状图（前30个）
      renderBarChart(data.slice(0, 30));
      renderTopChart(data.slice(0, 10));

      // 列表
      renderTable(data);

      document.getElementById('lastUpdate').textContent =
        `数据更新于 ${new Date().toLocaleTimeString('zh-CN')}`;
    }

    function renderBarChart(data) {
      if (!sectorBarChart) {
        sectorBarChart = echarts.init(document.getElementById('sectorBarChart'));
        window.addEventListener('resize', () => sectorBarChart.resize());
      }

      const names = data.map(d => d.name).reverse();
      const values = data.map(d => d.change_pct).reverse();
      const colors = values.map(v => v >= 0 ? '#ff4757' : '#00c853');

      sectorBarChart.setOption({
        backgroundColor: 'transparent',
        grid: { left: '25%', right: '5%', bottom: '3%', top: '3%' },
        xAxis: {
          type: 'value',
          axisLabel: { color: '#606078', fontSize: 10, formatter: '{value}%' },
          splitLine: { lineStyle: { color: '#2a2a45', type: 'dashed' } },
        },
        yAxis: {
          type: 'category',
          data: names,
          axisLabel: { color: '#e8e8f0', fontSize: 11 },
          axisLine: { show: false },
        },
        tooltip: {
          trigger: 'axis',
          axisPointer: { type: 'shadow' },
          backgroundColor: '#1e1e35',
          borderColor: '#2a2a45',
          textStyle: { color: '#e8e8f0' },
          formatter: function(params) {
            const p = params[0];
            return `<b>${p.axisValue}</b><br/>涨跌幅: <b style="color:${p.value>=0?'#ff4757':'#00c853'}">${p.value.toFixed(2)}%</b>`;
          }
        },
        series: [{
          type: 'bar',
          data: values.map((v, i) => ({
            value: v,
            itemStyle: {
              color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
                { offset: 0, color: v >= 0 ? 'rgba(255,71,87,0.3)' : 'rgba(0,200,83,0.3)' },
                { offset: 1, color: v >= 0 ? '#ff4757' : '#00c853' }
              ]),
              borderRadius: [0, 3, 3, 0]
            }
          })),
          barMaxWidth: 16,
          label: {
            show: true,
            position: 'right',
            color: '#9090a8',
            fontSize: 11,
            formatter: '{c}%'
          }
        }]
      });
    }

    function renderTopChart(data) {
      if (!sectorTopChart) {
        sectorTopChart = echarts.init(document.getElementById('sectorTopChart'));
        window.addEventListener('resize', () => sectorTopChart.resize());
      }

      const names = data.map(d => d.name);
      const values = data.map(d => d.change_pct);

      sectorTopChart.setOption({
        backgroundColor: 'transparent',
        tooltip: {
          trigger: 'axis',
          backgroundColor: '#1e1e35',
          borderColor: '#2a2a45',
          textStyle: { color: '#e8e8f0' },
          formatter: function(params) {
            const p = params[0];
            return `<b>${p.axisValue}</b><br/>涨跌幅: <b style="color:#ff4757">${p.value.toFixed(2)}%</b>`;
          }
        },
        grid: { left: '3%', right: '3%', bottom: '15%', top: '5%' },
        xAxis: {
          type: 'category',
          data: names,
          axisLabel: { color: '#606078', fontSize: 10, rotate: 35 },
          axisLine: { lineStyle: { color: '#2a2a45' } },
        },
        yAxis: {
          type: 'value',
          axisLabel: { color: '#606078', fontSize: 10, formatter: '{value}%' },
          splitLine: { lineStyle: { color: '#2a2a45', type: 'dashed' } },
        },
        series: [{
          type: 'bar',
          data: values,
          barMaxWidth: 30,
          itemStyle: {
            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
              { offset: 0, color: '#ff4757' },
              { offset: 1, color: 'rgba(255,71,87,0.3)' }
            ]),
            borderRadius: [3, 3, 0, 0]
          },
          label: {
            show: true,
            position: 'top',
            color: '#ff4757',
            fontSize: 11,
            formatter: '{c}%'
          }
        }]
      });
    }

    function renderTable(data) {
      const tbody = document.getElementById('sectorTableBody');
      tbody.innerHTML = data.map((s, i) => `
        <tr>
          <td style="color:var(--text-muted)">${i + 1}</td>
          <td><span class="stock-name">${s.name}</span></td>
          <td>${fmtPrice(s.price)}</td>
          <td class="${pctClass(s.change_pct)}" style="font-weight:600">${fmtPct(s.change_pct)}</td>
          <td>${s.amount || '—'}</td>
          <td>
            <span class="up">${s.up_count || 0}</span>
            /
            <span class="down">${s.down_count || 0}</span>
          </td>
          <td style="color:var(--text-secondary)">${s.lead_stock || '—'}</td>
        </tr>
      `).join('');
    }

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active', btn.textContent.includes(tab === 'industry' ? '行业' : '概念'));
      });
      // 概念板块暂时复用行业数据
      loadSectors();
    }

    async function init() {
      await loadSectors();
      setInterval(loadSectors, 60000);
    }

    init();
  </script>
</body>
</html>
