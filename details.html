    .stock-code { font-size: 13px; color: var(--text-faint); font-family: 'JetBrains Mono', monospace; }

    .hero-section .meta { font-size: 14px; color: var(--text-faint); display: flex; gap: 16px; align-items: center; }
    .hero-section .meta .tag { padding: 2px 10px; border-radius: 4px; font-size: 11px; font-weight: 600; background: rgba(94,106,210,0.15); color: var(--accent-violet); border: 1px solid rgba(94,106,210,0.3); }

    .section-icon { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
    .section-icon.industry { background: rgba(94,106,210,0.2); }
    .section-icon.growth { background: rgba(16,185,129,0.2); }
    .section-icon.valuation { background: rgba(245,158,11,0.2); }
    .section-icon.decision { background: rgba(99,102,241,0.2); }
    .section-icon.catalyst { background: rgba(6,182,212,0.2); }
    .section-icon.risk { background: rgba(239,68,68,0.2); }
    .section-title { font-size: 16px; font-weight: 600; color: var(--text-primary); }
    .section-content { font-size: 14px; line-height: 1.8; color: var(--text-secondary); }

    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-left: 8px; }
    .badge.bull { background: rgba(16,185,129,0.15); color: var(--success); }
    .badge.bear { background: rgba(239,68,68,0.15); color: var(--danger); }
    .badge.info { background: rgba(94,106,210,0.15); color: var(--accent-violet); }

    .not-found { text-align: center; padding: 80px 20px; }
    .not-found h2 { font-size: 24px; color: var(--text-primary); margin-bottom: 12px; }
    .not-found p { color: var(--text-muted); margin-bottom: 24px; }
    .not-found a { color: var(--accent); text-decoration: none; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .section { animation: fadeIn 0.3s ease forwards; }
    .section:nth-child(2) { animation-delay: 0.05s; }
    .section:nth-child(3) { animation-delay: 0.10s; }
    .section:nth-child(4) { animation-delay: 0.15s; }
    .section:nth-child(5) { animation-delay: 0.20s; }
    .section:nth-child(6) { animation-delay: 0.25s; }
  </style>
</head>

        decision:"卓越型：全球铜钴龙头，PE~10x极度低估，AI电力需求长期逻辑清晰。分红率~40%，股息率~4%。铜价每涨10%，利润增~20%。关键跟踪：铜价走势和TFM达产进度。",
        catalysts:"1) 铜价上行周期; 2) TFM混合矿达产超预期; 3) AI数据中心铜需求数据验证",
        risks:"商品周期下行；刚果(金)政治风险；钴价低迷拖累利润"
      }
    };

    const sections = [
      { key: 'industry', label: '产业逻辑', icon: 'industry', emoji: '🏭', desc: 'Q1-Q7: 靠什么赚钱？' },
      { key: 'growth', label: '业绩增长', icon: 'growth', emoji: '📈', desc: 'Q8-Q13: 能否赚更多？' },
      { key: 'valuation', label: '估值水平', icon: 'valuation', emoji: '💰', desc: 'Q14-Q18: 是否划算？' },
      { key: 'decision', label: '投资决策', icon: 'decision', emoji: '🎯', desc: 'Q19-Q20: 买不买？' },
      { key: 'catalysts', label: '催化剂', icon: 'catalyst', emoji: '⚡', desc: '价值重估触发因素' },
      { key: 'risks', label: '风险提示', icon: 'risk', emoji: '⚠️', desc: '需要关注的隐患' }
    ];

    function getStockName() {
      const params = new URLSearchParams(window.location.search);
      return params.get('stock') || '';
    }

    function render() {
      const name = getStockName();
      const data = analysis[name];
      const titleEl = document.getElementById('pageTitle');
      const codeEl = document.getElementById('pageCode');
      const contentEl = document.getElementById('content');

      if (!name || !data) {
        titleEl.textContent = '未找到股票';
        contentEl.innerHTML = '<div class="not-found"><h2>未找到分析数据</h2><p>请从 <a href="index.html">股票候选池</a> 点击股票查看分析。</p></div>';
        return;
      }

      titleEl.textContent = name;
      codeEl.textContent = data.code + ' · ' + data.sector;

      let html = '<div class="hero-section"><h1>' + name + '</h1><div class="meta"><span class="tag">' + data.sector + '</span><span>' + data.code + '</span><span>深度跟踪池</span></div></div>';

      sections.forEach(s => {
        html += '<div class="section"><div class="section-header"><div class="section-icon ' + s.icon + '">' + s.emoji + '</div><div class="section-title">' + s.label + ' <span class="badge info">' + s.desc + '</span></div></div><div class="section-content">' + (data[s.key] || '—') + '</div></div>';
      });

      contentEl.innerHTML = html;
    }

    render();
  </script>
</body>
</html>
